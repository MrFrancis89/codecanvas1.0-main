<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CodeCanvas">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" id="meta-theme-color" content="#0a0a0f">
  <title>CodeCanvas</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/one-dark.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/search/matchesonscrollbar.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/fold/foldgutter.min.css">
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">CodeCanvas</div>
  <div class="loading-spinner"></div>
</div>

<div id="app" style="opacity:0">
  <div id="toolbar">
    <div class="toolbar-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
      <span>CodeCanvas</span>
    </div>

    <div class="toolbar-group">
      <button class="tb-btn" id="btn-new" title="Novo arquivo (Ctrl+N)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        <span class="tb-label">Novo</span>
      </button>
      <button class="tb-btn" id="btn-open" title="Abrir arquivo (Ctrl+O)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        <span class="tb-label">Abrir</span>
      </button>
      <button class="tb-btn" id="btn-save" title="Salvar (Ctrl+S)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        <span class="tb-label">Salvar</span>
      </button>
    </div>

    <div class="toolbar-sep"></div>

    <div class="toolbar-group">
      <button class="tb-btn" id="btn-undo" title="Desfazer (Ctrl+Z)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg>
      </button>
      <button class="tb-btn" id="btn-redo" title="Refazer (Ctrl+Y)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 019-9 9 9 0 016 2.3L21 13"/></svg>
      </button>
    </div>

    <div class="toolbar-sep"></div>

    <button class="tb-btn" id="btn-find" title="Buscar e Substituir (Ctrl+H)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span class="tb-label">Buscar</span>
    </button>

    <button class="tb-btn" id="btn-firebase" title="Nuvem / Firebase">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span class="tb-label">Nuvem</span>
    </button>

    <div class="toolbar-sep"></div>

    <select id="lang-select" title="Linguagem">
      <option value="javascript">JavaScript</option>
      <option value="htmlmixed">HTML</option>
      <option value="css">CSS</option>
      <option value="python">Python</option>
      <option value="xml">XML/SVG</option>
      <option value="markdown">Markdown</option>
      <option value="sql">SQL</option>
      <option value="shell">Shell</option>
      <option value="clike">C/C++/Java</option>
      <option value="php">PHP</option>
      <option value="ruby">Ruby</option>
      <option value="rust">Rust</option>
      <option value="go">Go</option>
      <option value="yaml">YAML</option>
      <option value="json">JSON</option>
      <option value="typescript">TypeScript</option>
    </select>

    <div class="toolbar-spacer"></div>

    <div id="filename-chip" title="Clique para renomear">
      <span class="dot" id="dirty-dot"></span>
      <span class="chip-name" id="chip-name">sem_titulo.js</span>
    </div>

    <button class="tb-btn" id="btn-theme" title="Alternar tema">
      <svg id="icon-theme-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      <svg id="icon-theme-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>

  <div id="editor-wrap">
    <div id="find-panel">
      <div class="panel-title">
        Buscar e Substituir
        <button class="panel-close" id="find-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="find-row">
        <label>Buscar</label>
        <input class="cc-input" id="find-input" type="text" placeholder="Digite o texto..." autocomplete="off">
      </div>
      <div class="find-row">
        <label>Substituir</label>
        <input class="cc-input" id="replace-input" type="text" placeholder="Substituto..." autocomplete="off">
      </div>
      <div class="find-info" id="find-info">Pronto para buscar</div>
      <div class="find-actions">
        <button class="f-btn" id="find-prev">← Anterior</button>
        <button class="f-btn" id="find-next">Próximo →</button>
        <button class="f-btn" id="find-replace-one">Substituir</button>
        <button class="f-btn primary" id="find-replace-all">Substituir todos</button>
      </div>
    </div>

    <div id="firebase-panel">
      <div class="panel-title">
        Salvar na Nuvem
        <button class="panel-close" id="firebase-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="fb-status">
        <div class="fb-dot disconnected" id="fb-dot"></div>
        <span id="fb-status-text">Não conectado</span>
      </div>
      <div class="fb-field">
        <label>Project ID</label>
        <input type="text" id="fb-project-id" placeholder="meu-projeto-firebase">
      </div>
      <div class="fb-field">
        <label>API Key</label>
        <input type="text" id="fb-api-key" placeholder="AIzaSy...">
      </div>
      <div class="fb-field">
        <label>Nome do projeto</label>
        <input type="text" id="fb-doc-name" placeholder="meu-projeto">
      </div>
      <div class="fb-actions">
        <button class="f-btn" id="fb-connect">Conectar</button>
        <button class="f-btn" id="fb-save-cloud" disabled>Salvar</button>
        <button class="f-btn" id="fb-load-cloud" disabled>Carregar</button>
      </div>
    </div>

    <textarea id="cm-editor" style="display:none;">// Bem-vindo ao CodeCanvas 🎨
// Um editor de código PWA com design Apple

function helloWorld() {
  const message = "Olá, Mundo!";
  console.log(message);
  return message;
}

helloWorld();
</textarea>
  </div>

  <div id="statusbar">
    <div class="statusbar-group">
      <span class="statusbar-item">Ln <span id="status-line">1</span>, Col <span id="status-col">1</span></span>
      <span class="statusbar-item">Sel <span id="status-sel">0</span></span>
    </div>
    <div class="statusbar-group">
      <span class="statusbar-item" id="status-lang">JavaScript</span>
      <span class="statusbar-item">UTF-8</span>
      <span class="statusbar-item" id="status-size">0 B</span>
    </div>
  </div>
</div>

<input type="file" id="file-input" style="display:none" accept="*/*">

<div id="modal-overlay">
  <div id="modal-box">
    <div class="modal-title" id="modal-title">Renomear arquivo</div>
    <input type="text" class="cc-input" id="modal-input" autocomplete="off">
    <div class="modal-actions">
      <button class="modal-btn" id="modal-cancel">Cancelar</button>
      <button class="modal-btn primary" id="modal-confirm">OK</button>
    </div>
  </div>
</div>

<div id="confirm-overlay">
  <div id="confirm-box">
    <div class="modal-title" id="confirm-title">Confirmar</div>
    <p class="confirm-message" id="confirm-message"></p>
    <div class="modal-actions">
      <button class="modal-btn" id="confirm-cancel">Cancelar</button>
      <button class="modal-btn danger" id="confirm-ok">Descartar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<!-- CodeMirror core -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.js"></script>

<!-- Modos de linguagem -->
<!-- Ordem obrigatória: xml e css ANTES de htmlmixed (dependências diretas) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/markdown/markdown.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/sql/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/shell/shell.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/clike/clike.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/php/php.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/ruby/ruby.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/rust/rust.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/go/go.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/yaml/yaml.min.js"></script>

<!-- Addons de edição -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/edit/closetag.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/selection/active-line.min.js"></script>

<!-- Addons de fold -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/fold/foldcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/fold/foldgutter.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/fold/brace-fold.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/fold/indent-fold.min.js"></script>

<!-- Addons de busca — search.min.js REMOVIDO: conflitava com FindReplaceManager -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/search/searchcursor.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/scroll/annotatescrollbar.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/search/matchesonscrollbar.min.js"></script>

<!-- Módulos do app -->
<script src="config.js"></script>
<script src="storage-manager.js"></script>
<script src="theme-manager.js"></script>
<script src="toast-manager.js"></script>
<script src="modal-manager.js"></script>
<script src="lang-manager.js"></script>
<script src="file-manager.js"></script>
<script src="editor-manager.js"></script><script src="find-replace-manager.js"></script>

<!-- Firebase SDK (OBRIGATÓRIO) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Seu adapter -->
<script src="firebase-adapter.js"></script>

<script src="pwa-manager.js"></script>
<script src="app.js"></script>
